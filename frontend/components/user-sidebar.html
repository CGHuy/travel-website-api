<div class="user-sidebar-content">
    <!-- User Profile Header -->
    <div class="user-profile-header mb-4">
        <div class="d-flex align-items-center">
            <div class="avatar-box me-3" id="user-avatar-initial">
                K
            </div>
            <div class="user-info">
                <div class="user-name fw-bold" id="user-display-name">Khanh Ngoc</div>
                <div class="user-email text-muted small" id="user-display-email">ngockhanh74dctt23@gmai</div>
            </div>
        </div>
    </div>

    <!-- Navigation Menu -->
    <div class="user-nav-menu">
        <!-- Account Section -->
        <div class="nav-section mb-3">
            <div class="nav-section-header d-flex align-items-center mb-2">
                <i class="fa-regular fa-user me-3 icon-account"></i>
                <span class="fw-bold">Tài khoản</span>
            </div>
            <ul class="nav flex-column ps-4 mb-0">
                <li class="nav-item">
                    <a class="nav-link" href="/profile">Thông tin cá nhân</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/change-password">Đổi mật khẩu</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="logout-btn">Đăng xuất</a>
                </li>

            </ul>
        </div>

        <!-- Other Static Items – ẩn với staff/admin -->
        <div class="nav-item-static mb-3" id="sidebar-bookings">
            <a href="/bookings-history" class="d-flex align-items-center text-decoration-none">
                <i class="fa-solid fa-ticket-simple me-3 icon-bookings"></i>
                <span class="fw-bold">Đơn đặt chỗ</span>
            </a>
        </div>

        <div class="nav-item-static mb-3" id="sidebar-reviews">
            <a href="/reviews" class="d-flex align-items-center text-decoration-none">
                <i class="fa-regular fa-comment-dots me-3 icon-reviews"></i>
                <span class="fw-bold">Đánh giá của quý khách</span>
            </a>
        </div>

        <div class="nav-item-static mb-3" id="sidebar-favorites">
            <a href="/favorite" class="d-flex align-items-center text-decoration-none">
                <i class="fa-solid fa-heart me-3 icon-favorites"></i>
                <span class="fw-bold">Yêu thích đã lưu</span>
            </a>
        </div>
    </div>
</div>

<script>
    (function () {
        const userData = localStorage.getItem("user");

        // Các role không phải khách hàng → ẩn menu nghiệp vụ KH
        // Sử dụng đúng format role theo DB (gạch ngang)
        const STAFF_ROLES = ["admin", "booking-staff", "tour-staff"];

        if (userData) {
            try {
                const user = JSON.parse(userData);
                const nameEl = document.getElementById("user-display-name");
                const emailEl = document.getElementById("user-display-email");
                const initialEl = document.getElementById("user-avatar-initial");

                if (nameEl) nameEl.textContent = user.fullname || user.name || "Khách";
                if (emailEl) emailEl.textContent = user.email || "";
                if (initialEl) {
                    const name = user.fullname || user.name || "K";
                    initialEl.textContent = name.charAt(0).toUpperCase();
                }

                // Ẩn các mục chỉ dành cho khách hàng nếu là staff/admin
                const role = (user.role || "").toLowerCase();
                if (STAFF_ROLES.includes(role)) {
                    const bookingsEl   = document.getElementById("sidebar-bookings");
                    const reviewsEl    = document.getElementById("sidebar-reviews");
                    const favoritesEl  = document.getElementById("sidebar-favorites");
                    if (bookingsEl)  bookingsEl.style.display  = "none";
                    if (reviewsEl)   reviewsEl.style.display   = "none";
                    if (favoritesEl) favoritesEl.style.display = "none";
                }
            } catch (err) {
                console.error("Error parsing user data for sidebar:", err);
            }
        }

        // Logout functionality
        const logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", (e) => {
                e.preventDefault();
                if (confirm("Bạn có chắc chắn muốn đăng xuất?")) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                    window.location.href = "/index";
                }
            });
        }
    })();
</script>
