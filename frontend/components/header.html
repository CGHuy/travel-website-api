<header class="fixed-top d-flex align-items-center justify-content-between border-bottom px-5 py-3 bg-white bg-opacity-80 backdrop-blur-sm">
    <!-- Logo -->
    <a href="/pages/index.html" class="d-flex align-items-center gap-2 text-decoration-none text-body">
        <div style="width: 32px; height: 32px; color: #1976d2">
            <img src="/assets/images/icon.svg" alt="VietTravel logo" style="width: 32px; height: 32px; object-fit: contain" />
        </div>
        <h2 class="fs-4 fw-bold mb-0">VietTravel</h2>
    </a>

    <!-- Thanh điều hướng -->
    <nav class="d-none d-lg-flex flex-grow-1 justify-content-center align-items-center gap-4">
        <a class="text-decoration-none text-body fw-medium px-2 py-1" href="/pages/index.html">Điểm đến</a>
        <a class="text-decoration-none text-body fw-medium px-2 py-1" href="/list-tour">Tour</a>
        <a class="text-decoration-none text-body fw-medium px-2 py-1" href="#">Liên hệ</a>
        <a id="adminNavLink" class="d-none text-decoration-none text-body fw-medium px-2 py-1" href="/pages/admin/dashboard.html?page=tour">Admin</a>
    </nav>

    <div class="d-flex align-items-center gap-2">
        <a id="loginBtn" href="/pages/auth/login.html" class="d-none btn btn-primary rounded-pill px-4 fw-bold">Đăng nhập</a>
        <a id="registerBtn" href="/pages/auth/register.html" class="d-none btn btn-light rounded-pill px-4 fw-bold border">Đăng ký</a>

        <div id="userMenu" class="d-none d-flex align-items-center gap-2 position-relative">
            <p id="userName" class="d-none text-decoration-none text-body fw-medium px-2 py-1 mb-0"></p>

            <button id="avatarBtn" type="button" class="border-0 bg-transparent p-0 rounded-circle overflow-hidden" style="width: 40px; height: 40px; cursor: pointer" title="Thông tin cá nhân">
                <img id="userAvatar" src="/assets/images/image.png" alt="Avatar" style="width: 40px; height: 40px; object-fit: cover" />
            </button>

            <ul id="userDropdown" class="dropdown-menu dropdown-menu-end" style="display: none; position: absolute; top: 50px; right: 0">
                <li><a class="dropdown-item" href="/profile">Hồ sơ cá nhân</a></li>
                <li><a id="navHistory" class="dropdown-item" href="/bookings-history">Lịch sử đặt tour</a></li>
                <li><a id="navFavorites" class="dropdown-item" href="/favorite">Tour yêu thích</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" id="logoutBtn" href="#">Đăng xuất</a></li>
            </ul>
        </div>
    </div>
</header>



<!-- Toast Container Global -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="globalToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="globalToastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<!-- Modal Xác nhận Global -->
<div class="modal fade" id="globalConfirmModal" tabindex="-1" aria-hidden="true" style="z-index: 1090;">
    <div class="modal-dialog modal-dialog-centered modal-sm" style="max-width: 380px;">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.15);">
            <div class="modal-body" style="padding: 30px 25px; text-align: center;">
                <div id="globalConfirmIcon" style="width: 65px; height: 65px; background: #fff7ed; color: #f97316; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.8rem;">
                    <i class="fa-solid fa-circle-question"></i>
                </div>
                <h5 id="globalConfirmTitle" style="font-weight: 700; color: #1e293b; margin-bottom: 10px;">Xác nhận</h5>
                <p id="globalConfirmMessage" style="color: #64748b; font-size: 0.9rem; line-height: 1.5; margin-bottom: 0;"></p>
            </div>
            <div class="modal-footer" style="border: none; padding: 0 25px 25px; gap: 10px;">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="flex: 1; border-radius: 12px; font-weight: 600; padding: 12px; background: #f1f5f9; border: none; color: #64748b;">Hủy</button>
                <button type="button" id="globalConfirmSubmit" class="btn btn-primary" style="flex: 1; border-radius: 12px; font-weight: 600; padding: 12px; background: #1976d2; border: none; box-shadow: 0 4px 12px rgba(25, 118, 210, 0.2);">Đồng ý</button>
            </div>
        </div>
    </div>
</div>

<script src="/assets/js/header.js"></script>
