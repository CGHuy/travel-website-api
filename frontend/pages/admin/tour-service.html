<div class="card-header d-flex justify-content-between align-items-center p-0 px-4">
    <div>
        <h5 class="card-title"><i class="fa-solid fa-list me-2"></i>Quản lý Dịch vụ Tour</h5>
    </div>
    <div class="text-end mb-2">
        <span id="total-tour-has-service" class="badge bg-info">Tổng: 0 tour có dịch vụ</span>
    </div>
</div>
<div class="card-body">
    <div class="input-group search-group mb-3">
        <span class="input-group-text search-icon">
            <i class="fa-solid fa-magnifying-glass fa-sm"></i>
        </span>
        <input class="form-control search-input" placeholder="Tìm kiếm tour theo id, tên..." value="" aria-label="Tìm kiếm" />
    </div>
    <ul class="list-group list-group-flush" id="tour-service-list"></ul>
</div>

<!-- Modal -->
<div class="modal fade" id="serviceModal" tabindex="-1" aria-labelledby="serviceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="serviceModalLabel">Dịch vụ Tour</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="#" method="POST" id="service-form">
                <input type="hidden" name="tour_id" id="form-tour-id" value="" />
                <div class="modal-body pt-0">
                    <div class="input-group search-group mb-3">
                        <span class="input-group-text search-icon">
                            <i class="fa-solid fa-magnifying-glass fa-sm"></i>
                        </span>
                        <input id="service-search-input" class="form-control" placeholder="Tìm kiếm dịch vụ theo id, tên..." value="" aria-label="Tìm kiếm" />
                    </div>
                    <div id="services-container"></div>
                </div>
                <div class="modal-footer p-3 pb-0">
                    <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-1"></i> Lưu Dịch vụ</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="fas fa-times me-1"></i> Hủy</button>
                </div>
            </form>
        </div>
    </div>
</div>
