<style>
    /* User Management Scoped Styles */
    .user-management-wrapper {
        font-family: 'Lexend Deca', sans-serif;
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .user-management-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 0 4px;
    }

    .user-management-title-group h4 {
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 6px;
        font-size: 1.5rem;
    }

    .user-management-title-group p {
        color: #6b7280;
        margin: 0;
        font-size: 0.95rem;
    }

    .btn-add-user {
        background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        color: white;
        border: none;
        padding: 10px 22px;
        border-radius: 10px;
        font-weight: 500;
        font-size: 0.95rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-add-user:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        color: white;
    }

    .btn-add-user:active {
        transform: translateY(0);
    }

    .filter-wrapper {
        background: #ffffff;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid #f3f4f6;
        margin-bottom: 24px;
    }

    .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 16px;
    }

    .filter-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .filter-item label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #475569;
        margin-left: 4px;
    }

    .filter-input, .filter-select {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        font-size: 0.95rem;
        color: #1e293b;
        transition: all 0.3s ease;
    }

    .filter-input:focus, .filter-select:focus {
        outline: none;
        border-color: #3b82f6;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .filter-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        align-items: center;
        border-top: 1px dashed #e2e8f0;
        padding-top: 16px;
    }

    .btn-search-advanced {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
    }

    .btn-search-advanced:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }

    .btn-reset-advanced {
        background: #f8fafc;
        color: #475569;
        border: 1px solid #cbd5e1;
        padding: 10px 24px;
        border-radius: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-reset-advanced:hover {
        background: #e2e8f0;
        color: #1e293b;
    }

    .table-container {
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid #f3f4f6;
    }

    .modern-table {
        width: 100%;
        border-collapse: collapse;
        margin: 0;
    }

    .modern-table th {
        background-color: #f8fafc;
        color: #475569;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        padding: 18px 20px;
        border-bottom: 2px solid #e2e8f0;
        text-align: left;
    }

    .modern-table td {
        padding: 16px 20px;
        color: #334155;
        font-size: 0.95rem;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
        transition: all 0.2s ease;
    }
    
    /* Subtle zebra striping mixed with hover */
    .modern-table tbody tr:nth-child(even) td {
        background-color: #fafaf9;
    }

    .modern-table tbody tr:hover td {
        background-color: #f1f5f9;
    }

    .modern-table tbody tr:last-child td {
        border-bottom: none;
    }

    /* Badge Styles */
    .status-badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        display: inline-block;
        letter-spacing: 0.3px;
    }

    .status-active {
        background-color: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
    }

    /* Avatar styles for more pro look */
    .user-info-cell {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .avatar-placeholder {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
        color: #4338ca;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1rem;
        flex-shrink: 0;
        box-shadow: 0 2px 6px rgba(67, 56, 202, 0.15);
    }
    
    .user-name {
        font-weight: 500;
        color: #1e293b;
    }

    /* Action Buttons */
    .action-btns {
        display: flex;
        gap: 8px;
    }

    .action-btn {
        background: transparent;
        border: 1px solid transparent;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        font-size: 0.9rem;
        font-weight: 500;
        gap: 6px;
    }

    .btn-edit:hover {
        background-color: #eff6ff;
        border-color: #bfdbfe;
        color: #2563eb;
    }

    .btn-delete:hover {
        background-color: #fef2f2;
        border-color: #fecaca;
        color: #dc2626;
    }

</style>

<div class="user-management-wrapper">
    <div class="user-management-header">
        <div class="user-management-title-group">
            <h4>Quản lý User</h4>
            <p>Danh sách các người dùng</p>
        </div>
        <button class="btn-add-user" data-bs-toggle="modal" data-bs-target="#addUserModal">
            <i class="fa-solid fa-plus"></i> Thêm User Mới
        </button>
    </div>

    <div class="filter-wrapper">
        <div class="filter-grid">
            <div class="filter-item">
                <label for="filterId">User ID</label>
                <input type="text" id="filterId" class="filter-input" placeholder="Ví dụ: 7" />
            </div>
            <div class="filter-item">
                <label for="filterFullname">Họ và tên</label>
                <input type="text" id="filterFullname" class="filter-input" placeholder="Nhập tên..." />
            </div>
            <div class="filter-item">
                <label for="filterPhone">Số điện thoại</label>
                <input type="text" id="filterPhone" class="filter-input" placeholder="Nhập SĐT..." />
            </div>
            <div class="filter-item">
                <label for="filterRole">Vai trò</label>
                <select id="filterRole" class="filter-select">
                    <option value="">Tất cả</option>
                    <option value="admin">Admin</option>
                    <option value="customer">Khách hàng</option>
                    <option value="tour-staff">Nhân viên Tour</option>
                    <option value="booking-staff">Nhân viên Booking</option>
                </select>
            </div>
            <div class="filter-item">
                <label for="filterStatus">Trạng thái</label>
                <select id="filterStatus" class="filter-select">
                    <option value="">Tất cả</option>
                    <option value="1">Hoạt động</option>
                    <option value="0">Đã khóa</option>
                </select>
            </div>
        </div>
        <div class="filter-actions">
            <button id="resetFilterBtn" class="btn-reset-advanced">
                <i class="fa-solid fa-rotate-right"></i> Làm mới
            </button>
            <button id="searchBtn" class="btn-search-advanced">
                <i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm
            </button>
        </div>
    </div>

    <div class="table-container">
        <table class="modern-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 2rem; color: #6b7280;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Đang tải dữ liệu...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    window.initAdminUserPage = async function() {
        const userTableBody = document.getElementById('userTableBody');
        const filterId = document.getElementById('filterId');
        const filterFullname = document.getElementById('filterFullname');
        const filterPhone = document.getElementById('filterPhone');
        const filterRole = document.getElementById('filterRole');
        const filterStatus = document.getElementById('filterStatus');
        const searchBtn = document.getElementById('searchBtn');
        const resetFilterBtn = document.getElementById('resetFilterBtn');

        // Hàm lấy chữ cái đầu tiên của tên để làm avatar
        function getAvatarLetter(fullname) {
            if (!fullname) return '?';
            const names = fullname.trim().split(' ');
            return names[names.length - 1].charAt(0).toUpperCase();
        }

        // Lấy danh sách users từ API
        async function fetchUsers() {
            const token = localStorage.getItem('token');
            if (!token) {
                userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #dc2626;">Vui lòng đăng nhập để xem dữ liệu.</td></tr>`;
                return;
            }

            try {
                const response = await fetch('/api/users/all', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                });
                const result = await response.json();

                if (result.success && result.data) {
                    renderUsers(result.data);
                } else {
                    userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #dc2626;">Lỗi: ${result.message || 'Không thể tải dữ liệu'}</td></tr>`;
                }
            } catch (error) {
                console.error('Lỗi khi gọi API:', error);
                userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #dc2626;">Đã xảy ra lỗi kết nối với máy chủ.</td></tr>`;
            }
        }

        // Hiển thị dữ liệu ra bảng
        function renderUsers(users) {
            userTableBody.innerHTML = ''; // Xóa placeholder "Đang tải"
            
            if (users.length === 0) {
                userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #6b7280;">Không có người dùng nào.</td></tr>`;
                return;
            }

            users.forEach(user => {
                const avatar = getAvatarLetter(user.fullname);
                
                // Tùy chỉnh hiển thị vai trò (role)
                let roleDisplay = user.role;
                if (user.role === 'admin') roleDisplay = 'Admin';
                else if (user.role === 'customer') roleDisplay = 'Khách hàng';
                else if (user.role === 'tour-staff') roleDisplay = 'NV Tour';
                else if (user.role === 'booking-staff') roleDisplay = 'NV Booking';

                // Tùy chỉnh hiển thị trạng thái (status)
                const statusHtml = user.status === 1 
                    ? `<span class="status-badge status-active">Hoạt động</span>` 
                    : `<span class="status-badge" style="background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca;">Đã khóa</span>`;

                const phoneDisplay = user.phone || '<span style="color: #9ca3af; font-style: italic;">Chưa cập nhật</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-semibold">${user.id}</td>
                    <td>
                        <div class="user-info-cell">
                            <div class="avatar-placeholder">${avatar}</div>
                            <span class="user-name">${user.fullname}</span>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td>${phoneDisplay}</td>
                    <td class="text-capitalize text-muted fw-medium">${roleDisplay}</td>
                    <td>${statusHtml}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn btn-edit" title="Sửa"><i class="fa-solid fa-pen-to-square"></i> Sửa</button>
                            <button class="action-btn btn-delete" title="Xóa"><i class="fa-solid fa-trash-can"></i> Xóa</button>
                        </div>
                    </td>
                `;
                userTableBody.appendChild(tr);
            });
        }

        // Thực thi việc fetch dữ liệu
        await fetchUsers();

        // Xử lý sự kiện tìm kiếm
        const handleSearch = async () => {
            const params = new URLSearchParams();
            if (filterId.value.trim()) params.append('id', filterId.value.trim());
            if (filterFullname.value.trim()) params.append('fullname', filterFullname.value.trim());
            if (filterPhone.value.trim()) params.append('phone', filterPhone.value.trim());
            if (filterRole.value) params.append('role', filterRole.value);
            if (filterStatus.value !== '') params.append('status', filterStatus.value);

            const queryString = params.toString();
            if (!queryString) {
                return fetchUsers();
            }

            await doSearchUser(queryString);
        };

        searchBtn.addEventListener('click', handleSearch);
        
        [filterId, filterFullname, filterPhone].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
        });

        resetFilterBtn.addEventListener('click', () => {
            filterId.value = '';
            filterFullname.value = '';
            filterPhone.value = '';
            filterRole.value = '';
            filterStatus.value = '';
            fetchUsers();
        });

        // Hàm gọi API tìm kiếm
        async function doSearchUser(queryString) {
            const token = localStorage.getItem('token');
            if (!token) return;

            userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 2rem; color: #6b7280;"><i class="fa-solid fa-spinner fa-spin"></i> Đang tìm kiếm...</td></tr>`;

            try {
                const response = await fetch(`/api/users/search?${queryString}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                });
                const result = await response.json();

                if (result.success && result.data) {
                    const dataToRender = Array.isArray(result.data) ? result.data : [result.data];
                    renderUsers(dataToRender);
                } else {
                    userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #6b7280;">Không tìm thấy người dùng phù hợp.</td></tr>`;
                }
            } catch (error) {
                console.error('Lỗi khi tìm kiếm:', error);
                userTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #dc2626;">Đã xảy ra lỗi khi tìm kiếm.</td></tr>`;
            }
        }
    };
</script>
