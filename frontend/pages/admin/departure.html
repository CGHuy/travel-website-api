<link rel="stylesheet" href="../../assets/css/admin/departure.css" />

<div class="departure-management-wrapper">
    <!-- Header -->
    <div class="departure-header">
        <div class="departure-title-group">
            <h4><i class="fa-solid fa-location-dot"></i> Quản lý Điểm Khởi Hành</h4>
        </div>
        <div class="badge-total">Tổng: 20 điểm khởi hành</div>
    </div>

    <!-- Toolbar -->
    <div class="departure-toolbar">
        <div class="search-wrapper" style="display: flex; gap: 12px; align-items: center; width: 100%">
            <div style="position: relative; flex-grow: 1">
                <input type="text" id="searchDepartureInput" class="search-input-modern" style="width: 100%" placeholder="Tìm kiếm theo mã DEP (VD: 3), ID Tour, hoặc Trạng thái (open/full/closed)..." />
                <i class="fa-solid fa-magnifying-glass" style="position: absolute; top: 50%; transform: translateY(-50%); left: 20px; color: #9ca3af"></i>
            </div>
            <button id="searchDepartureBtn" class="btn-add-departure" style="height: 100%; margin: 0; padding: 15px 24px">Tìm</button>
        </div>
        <button class="btn-add-departure" data-bs-toggle="modal" data-bs-target="#addDepartureModal">Thêm Điểm Khởi Hành Mới</button>
    </div>

    <!-- Cards List -->
    <div class="departure-list" id="departureList">
        <div style="text-align: center; padding: 2rem; color: #6b7280"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải dữ liệu điểm khởi hành...</div>
    </div>
</div>

<!-- Modal Thêm Điểm Khởi Hành -->
<div class="modal fade" id="addDepartureModal" tabindex="-1" aria-labelledby="addDepartureModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)">
            <div class="modal-header" style="border-bottom: 1px solid #f1f5f9; padding: 20px 24px">
                <h5 class="modal-title" id="addDepartureModalLabel" style="font-weight: 700; color: #1e293b">Thêm Điểm Khởi Hành Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 24px">
                <form id="addDepartureForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="addTourId" class="form-label" style="font-weight: 500; font-size: 0.9rem">ID Tour *</label>
                            <input type="number" class="form-control" id="addTourId" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="addDepartureDate" class="form-label" style="font-weight: 500; font-size: 0.9rem">Ngày Khởi Hành *</label>
                            <input type="date" class="form-control" id="addDepartureDate" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="addDepartureLocation" class="form-label" style="font-weight: 500; font-size: 0.9rem">Địa điểm Khởi Hành *</label>
                        <input type="text" class="form-control" id="addDepartureLocation" placeholder="Ví dụ: Sân bay Tân Sơn Nhất, TP.HCM" required style="border-radius: 10px; padding: 10px 16px" />
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="addPriceMoving" class="form-label" style="font-weight: 500; font-size: 0.9rem">Giá di chuyển *</label>
                            <input type="number" class="form-control" id="addPriceMoving" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="addPriceMovingChild" class="form-label" style="font-weight: 500; font-size: 0.9rem">Giá di chuyển (Trẻ em) *</label>
                            <input type="number" class="form-control" id="addPriceMovingChild" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="addSeatsTotal" class="form-label" style="font-weight: 500; font-size: 0.9rem">Tổng số lượng chỗ *</label>
                            <input type="number" class="form-control" id="addSeatsTotal" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: 1px solid #f1f5f9; padding: 16px 24px">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius: 10px; font-weight: 500; padding: 10px 20px">Hủy</button>
                <button type="button" class="btn btn-primary" id="saveAddDepartureBtn" style="border-radius: 10px; font-weight: 500; padding: 10px 20px; background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); border: none">Thêm mới</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Sửa Điểm Khởi Hành -->
<div class="modal fade" id="editDepartureModal" tabindex="-1" aria-labelledby="editDepartureModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)">
            <div class="modal-header" style="border-bottom: 1px solid #f1f5f9; padding: 20px 24px">
                <h5 class="modal-title" id="editDepartureModalLabel" style="font-weight: 700; color: #1e293b">Sửa Điểm Khởi Hành</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 24px">
                <form id="editDepartureForm">
                    <input type="hidden" id="editDepId" />
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="editDepTourId" class="form-label" style="font-weight: 500; font-size: 0.9rem">ID Tour *</label>
                            <input type="number" class="form-control" id="editDepTourId" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="editDepDate" class="form-label" style="font-weight: 500; font-size: 0.9rem">Ngày Khởi Hành *</label>
                            <input type="date" class="form-control" id="editDepDate" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editDepLocation" class="form-label" style="font-weight: 500; font-size: 0.9rem">Địa điểm Khởi Hành *</label>
                        <input type="text" class="form-control" id="editDepLocation" required style="border-radius: 10px; padding: 10px 16px" />
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="editDepPrice" class="form-label" style="font-weight: 500; font-size: 0.9rem">Giá di chuyển *</label>
                            <input type="number" class="form-control" id="editDepPrice" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="editDepPriceChild" class="form-label" style="font-weight: 500; font-size: 0.9rem">Giá di chuyển (Trẻ em) *</label>
                            <input type="number" class="form-control" id="editDepPriceChild" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="editDepSeatsTotal" class="form-label" style="font-weight: 500; font-size: 0.9rem">Tổng số lượng chỗ *</label>
                            <input type="number" class="form-control" id="editDepSeatsTotal" required style="border-radius: 10px; padding: 10px 16px" />
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editDepSeatsAvail" class="form-label" style="font-weight: 500; font-size: 0.9rem">Số chỗ còn trống *</label>
                        <input type="number" class="form-control" id="editDepSeatsAvail" required style="border-radius: 10px; padding: 10px 16px" />
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: 1px solid #f1f5f9; padding: 16px 24px">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius: 10px; font-weight: 500; padding: 10px 20px">Hủy</button>
                <button type="button" class="btn btn-primary" id="saveEditDepartureBtn" style="border-radius: 10px; font-weight: 500; padding: 10px 20px; background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); border: none">Lưu thay đổi</button>
            </div>
        </div>
    </div>
</div>

<!-- Mini Modals cho Quick Edit -->
<div class="modal fade" id="quickPriceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)">
            <div class="modal-body" style="padding: 24px">
                <h6 style="font-weight: 700; margin-bottom: 16px; color: #1e293b">Cập nhật Giá</h6>
                <input type="hidden" id="quickPriceId" />
                <div class="mb-3">
                    <label style="font-size: 0.85rem; font-weight: 500">Giá người lớn</label>
                    <input type="number" id="quickPriceAdult" class="form-control" style="border-radius: 8px" />
                </div>
                <div class="mb-4">
                    <label style="font-size: 0.85rem; font-weight: 500">Giá trẻ em</label>
                    <input type="number" id="quickPriceChild" class="form-control" style="border-radius: 8px" />
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button class="btn btn-light" data-bs-dismiss="modal" style="border-radius: 8px; font-size: 0.9rem">Hủy</button>
                    <button class="btn btn-primary" id="saveQuickPriceBtn" style="border-radius: 8px; font-size: 0.9rem">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="quickStatusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)">
            <div class="modal-body" style="padding: 24px">
                <h6 style="font-weight: 700; margin-bottom: 16px; color: #1e293b">Đổi Trạng thái</h6>
                <input type="hidden" id="quickStatusId" />
                <div class="mb-4">
                    <select id="quickStatusSelect" class="form-select" style="border-radius: 8px">
                        <option value="open">Mở (Open)</option>
                        <option value="closed">Đóng (Closed)</option>
                        <option value="full">Đầy (Full)</option>
                    </select>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button class="btn btn-light" data-bs-dismiss="modal" style="border-radius: 8px; font-size: 0.9rem">Hủy</button>
                    <button class="btn btn-primary" id="saveQuickStatusBtn" style="border-radius: 8px; font-size: 0.9rem">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="quickSeatsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)">
            <div class="modal-body" style="padding: 24px">
                <h6 style="font-weight: 700; margin-bottom: 12px; color: #1e293b">Cập nhật tổng số chỗ trống</h6>
                <p style="font-size: 0.85rem; color: #6b7280; line-height: 1.4; margin-bottom: 16px">Nhập trực tiếp số lượng chỗ còn trống thực tế hiện tại vào ô bên dưới.</p>
                <input type="hidden" id="quickSeatsId" />
                <input type="hidden" id="quickSeatsCurrentAvailable" />
                <div class="mb-4">
                    <input type="number" id="quickSeatsAvailable" class="form-control" placeholder="VD: 15" style="border-radius: 8px" />
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button class="btn btn-light" data-bs-dismiss="modal" style="border-radius: 8px; font-size: 0.9rem">Hủy</button>
                    <button class="btn btn-primary" id="saveQuickSeatsBtn" style="border-radius: 8px; font-size: 0.9rem">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055">
    <div id="actionToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="actionToastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="../../assets/js/admin/departure.js"></script>
