<link rel="stylesheet" href="/assets/css/admin/booking.css" />

<div class="d-flex justify-content-between align-items-center px-3">
    <div>
        <h5 class="card-title mb-0"><i class="fa-solid fa-calendar-days me-2"></i>Quản lý Booking</h5>
        <small class="text-muted">Danh sách các booking mà khách hàng đã đặt</small>
    </div>
    <div class="text-end">
        <span class="badge bg-info">Tổng: <span id="booking-total-count">0</span> booking</span>
    </div>
</div>

<div class="card-body">
    <div class="row mb-3">
        <div class="col-md-8">
            <div class="input-group search-group">
                <span class="input-group-text search-icon"><i class="fa-solid fa-magnifying-glass fa-sm"></i></span>
                <input id="booking-search-input" class="form-control search-input" placeholder="Tìm kiếm booking theo mã, tên khách, tên tour..." aria-label="Tìm kiếm booking" />
            </div>
        </div>
        <div class="col-md-4 text-end">
            <div class="btn-group">
                <button id="refresh-bookings" class="btn btn-outline-secondary btn-sm">Làm mới</button>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-custom align-middle">
            <thead class="text-muted">
                <tr>
                    <th class="text-nowrap">Mã Booking</th>
                    <th>Khách hàng</th>
                    <th>Tên Tour</th>
                    <th class="text-nowrap">Khởi hành</th>
                    <th class="text-nowrap">Tổng tiền</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-nowrap">Ngày đặt</th>
                </tr>
            </thead>
            <tbody id="booking-list-body">
                <tr>
                    <td colspan="7" class="text-center text-muted p-4">Đang tải danh sách booking...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Phân trang -->
    <div class="d-flex justify-content-between align-items-center mt-3 px-2">
        <div class="text-muted small">
            Hiển thị <span id="booking-range">0-0</span> trong <span id="booking-total-filtered">0</span>
        </div>
        <nav aria-label="Page navigation">
            <ul class="pagination pagination-sm mb-0" id="booking-pagination">
                <!-- Pagination items will be injected here -->
            </ul>
        </nav>
    </div>
</div>

<template id="booking-row-template">
    <tr>
        <td class="booking-code">BOK000</td>
        <td class="booking-customer">Khách</td>
        <td class="booking-tour">Tour name</td>
        <td class="booking-date text-nowrap">--/--/----</td>
        <td class="booking-total text-nowrap">0 VNĐ</td>
        <td class="booking-status text-center">
            <span class="badge bg-secondary">pending</span>
        </td>
        <td class="booking-created text-nowrap">--/--/----</td>
    </tr>
</template>

<script src="/assets/js/admin/booking.js"></script>
