<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Đánh giá của quý khách | VietTravel</title>
		<link rel="icon" href="/assets/images/icon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
		/>
		<link rel="stylesheet" href="../../assets/css/index.css" />
		<link rel="stylesheet" href="../../assets/css/user-sidebar.css" />
		<style>
			.reviews-container {
				background: #fff;
				border-radius: 15px;
				padding: 30px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
				border: 1px solid #f1f5f9;
			}
			.section-header {
				border-bottom: 2px solid #f8f9fa;
				margin-bottom: 30px;
				padding-bottom: 15px;
			}
			.section-title {
				color: #0f172a;
				font-weight: 800;
				font-size: 1.5rem;
				margin-bottom: 5px;
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.section-title i {
				color: #3b82f6;
			}
			.review-form-box {
				background: #f8fafc;
				border-radius: 12px;
				padding: 25px;
				margin-bottom: 40px;
				border: 1px solid #e2e8f0;
			}
			/* Star Rating Style */
			.star-rating {
				display: flex;
				flex-direction: row-reverse;
				justify-content: flex-end;
				gap: 8px;
				margin-bottom: 20px;
			}
			.star-rating input {
				display: none;
			}
			.star-rating label {
				font-size: 1.8rem;
				color: #cbd5e1;
				cursor: pointer;
				transition: all 0.2s ease;
			}
			.star-rating label:hover,
			.star-rating label:hover ~ label,
			.star-rating input:checked ~ label {
				color: #fbbf24;
				transform: scale(1.1);
			}
			.form-label {
				font-weight: 600;
				color: #334155;
				margin-bottom: 8px;
			}
			.form-control {
				border: 1px solid #e2e8f0;
				border-radius: 8px;
				padding: 12px 15px;
				transition: all 0.3s;
			}
			.form-control:focus {
				border-color: #3b82f6;
				box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
			}
			.btn-submit-review {
				background: #3b82f6;
				border: none;
				padding: 12px 30px;
				border-radius: 8px;
				font-weight: 700;
				color: #fff;
				transition: all 0.3s;
			}
			.btn-submit-review:hover {
				background: #2563eb;
				transform: translateY(-2px);
				box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
			}
			/* History List */
			.review-history-list {
				display: flex;
				flex-direction: column;
				gap: 20px;
			}
			.review-item-card {
				background: #fff;
				border: 1px solid #e2e8f0;
				border-radius: 12px;
				padding: 24px;
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
				position: relative;
			}
			.review-item-card:hover {
				border-color: #3b82f6;
				box-shadow: 0 10px 25px rgba(59, 130, 246, 0.08);
				transform: translateY(-2px);
			}
			.review-tour-name {
				color: #1e293b;
				font-size: 1.1rem;
				font-weight: 700;
				letter-spacing: -0.01em;
			}
			.booking-id-badge {
				background: #f1f5f9;
				color: #475569;
				padding: 4px 12px;
				border-radius: 6px;
				font-size: 0.8rem;
				font-weight: 600;
				border: 1px solid #e2e8f0;
			}
			.review-date {
				font-size: 0.85rem;
				color: #94a3b8;
				display: flex;
				align-items: center;
			}
			.review-stars-static {
				color: #fbbf24;
				font-size: 0.9rem;
			}
			.review-text {
				color: #334155;
				font-size: 1rem;
				line-height: 1.7;
				background: #f0f7ff;
				padding: 18px 24px;
				border-radius: 12px;
				margin-top: 15px;
				border-left: 5px solid #3b82f6;
				width: 100%;
				min-height: 100px;
			}
			.btn-action {
				width: 38px;
				height: 38px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 10px;
				transition: all 0.2s;
				border: 1px solid #e2e8f0;
				background: #fff;
			}
			.btn-edit-review {
				color: #3b82f6;
			}
			.btn-edit-review:hover {
				background: #3b82f6;
				color: #fff;
				border-color: #3b82f6;
			}

			.main-title {
				text-align: center;
				color: #0056b3;
				font-weight: 800;
				font-size: 2.2rem;
				margin-bottom: 40px;
			}
			.back-link {
				color: #64748b;
				text-decoration: none;
				font-weight: 600;
				margin-bottom: 20px;
				display: inline-block;
				transition: color 0.2s;
			}
			.back-link:hover {
				color: #3b82f6;
			}
			#no-reviews {
				text-align: center;
				padding: 40px;
				color: #94a3b8;
			}
		</style>
	</head>

	<body>
		<div id="header-placeholder"></div>

		<div class="container my-5">
			<a href="/index" class="back-link">
				<i class="fa-solid fa-arrow-left me-2"></i> Quay lại
			</a>

			<h1 class="main-title">Đánh giá của bạn</h1>

			<div class="row">
				<div class="col-lg-3 col-md-4">
					<div id="side-placeholder" class="user-sidebar-container"></div>
				</div>

				<div class="col-lg-9 col-md-8">
					<div class="reviews-container">
						<!-- History List -->
						<div class="section-header mt-2">
							<h2 class="section-title">
								<i class="fa-solid fa-history"></i>
								Lịch sử đánh giá
							</h2>
						</div>

						<div id="review-history-list" class="review-history-list">
							<!-- Review cards (rendered by reviews.js) -->
						</div>

						<div id="no-reviews" class="d-none">
							<i class="fa-solid fa-comment-slash fa-3x mb-3"></i>
							<h5>Hiện tại bạn chưa gửi đánh giá nào!</h5>
							<p>Hãy gửi đánh giá đầu tiên của bạn để chia sẻ cảm nghĩ nhé.</p>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="footer-placeholder"></div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="../../assets/js/reviews.js"></script>
	</body>
</html>
