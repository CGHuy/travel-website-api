<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Đánh giá của quý khách | VietTour</title>
        <link rel="icon" href="/assets/images/icon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <link rel="stylesheet" href="../../assets/css/index.css" />
        <link rel="stylesheet" href="../../assets/css/user-sidebar.css" />
        <style>
            .reviews-container {
                background: #fff;
                border-radius: 15px;
                padding: 30px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
                border: 1px solid #f1f5f9;
            }
            .section-header {
                border-bottom: 2px solid #f8f9fa;
                margin-bottom: 30px;
                padding-bottom: 15px;
            }
            .section-title {
                color: #0f172a;
                font-weight: 800;
                font-size: 1.5rem;
                margin-bottom: 5px;
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .section-title i {
                color: #3b82f6;
            }
            .review-form-box {
                background: #f8fafc;
                border-radius: 12px;
                padding: 25px;
                margin-bottom: 40px;
                border: 1px solid #e2e8f0;
            }
            /* Star Rating Style */
            .star-rating {
                display: flex;
                flex-direction: row-reverse;
                justify-content: flex-end;
                gap: 8px;
                margin-bottom: 20px;
            }
            .star-rating input {
                display: none;
            }
            .star-rating label {
                font-size: 1.8rem;
                color: #cbd5e1;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .star-rating label:hover,
            .star-rating label:hover ~ label,
            .star-rating input:checked ~ label {
                color: #fbbf24;
                transform: scale(1.1);
            }
            .form-label {
                font-weight: 600;
                color: #334155;
                margin-bottom: 8px;
            }
            .form-control {
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                padding: 12px 15px;
                transition: all 0.3s;
            }
            .form-control:focus {
                border-color: #3b82f6;
                box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            }
            .btn-submit-review {
                background: #3b82f6;
                border: none;
                padding: 12px 30px;
                border-radius: 8px;
                font-weight: 700;
                color: #fff;
                transition: all 0.3s;
            }
            .btn-submit-review:hover {
                background: #2563eb;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            }
            /* History List */
            .review-history-list {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .review-item-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                padding: 20px;
                transition: all 0.3s;
                position: relative;
            }
            .review-item-card:hover {
                border-color: #3b82f6;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            }
            .review-date {
                font-size: 0.85rem;
                color: #94a3b8;
                margin-bottom: 8px;
            }
            .review-stars-static {
                color: #fbbf24;
                margin-bottom: 12px;
            }
            .review-text {
                color: #475569;
                font-size: 0.95rem;
                line-height: 1.6;
            }
            .main-title {
                text-align: center;
                color: #0f172a;
                font-weight: 800;
                font-size: 2.2rem;
                margin-bottom: 40px;
            }
            .back-link {
                color: #64748b;
                text-decoration: none;
                font-weight: 600;
                margin-bottom: 20px;
                display: inline-block;
                transition: color 0.2s;
            }
            .back-link:hover {
                color: #3b82f6;
            }
            #no-reviews {
                text-align: center;
                padding: 40px;
                color: #94a3b8;
            }
        </style>
    </head>

    <body>
        <div id="header-placeholder"></div>

        <div class="container my-5">
            <a href="/index" class="back-link">
                <i class="fa-solid fa-arrow-left me-2"></i> Quay lại trang chủ
            </a>

            <h1 class="main-title">Đánh giá của bạn</h1>

            <div class="row">
                <div class="col-lg-3 col-md-4">
                    <div id="side-placeholder" class="user-sidebar-container"></div>
                </div>

                <div class="col-lg-9 col-md-8">
                    <div class="reviews-container">
                        <!-- Submission Form -->
                        <div class="section-header">
                            <h2 class="section-title">
                                <i class="fa-solid fa-pen-to-square"></i>
                                Gửi đánh giá mới
                            </h2>
                            <p class="text-muted small">Chia sẻ trải nghiệm của bạn về VietTour để giúp chúng tôi cải thiện hơn nữa!</p>
                        </div>

                        <form id="reviewForm" class="review-form-box">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tên người đánh giá</label>
                                    <input type="text" id="reviewerName" class="form-control" placeholder="Nhập họ tên..." required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Gmail</label>
                                    <input type="email" id="reviewerEmail" class="form-control" placeholder="Nhập gmail..." required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Số sao đánh giá</label>
                                    <div class="star-rating">
                                        <input type="radio" id="star5" name="rating" value="5" required /><label for="star5" title="Excellent"><i class="fa-solid fa-star"></i></label>
                                        <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="Very Good"><i class="fa-solid fa-star"></i></label>
                                        <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="Good"><i class="fa-solid fa-star"></i></label>
                                        <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="Fair"><i class="fa-solid fa-star"></i></label>
                                        <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="Poor"><i class="fa-solid fa-star"></i></label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Bình luận của bạn</label>
                                    <textarea id="reviewComment" class="form-control" rows="4" placeholder="Cảm nghĩ của bạn về chuyến đi..." required></textarea>
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <button type="submit" class="btn btn-submit-review">
                                        Gửi đánh giá ngay
                                    </button>
                                </div>
                            </div>
                        </form>

                        <!-- History List -->
                        <div class="section-header mt-5">
                            <h2 class="section-title">
                                <i class="fa-solid fa-history"></i>
                                Lịch sử đánh giá
                            </h2>
                        </div>

                        <div id="review-history-list" class="review-history-list">
                            <!-- Review cards (rendered by reviews.js) -->
                        </div>

                        <div id="no-reviews" class="d-none">
                            <i class="fa-solid fa-comment-slash fa-3x mb-3"></i>
                            <h5>Hiện tại bạn chưa gửi đánh giá nào!</h5>
                            <p>Hãy gửi đánh giá đầu tiên của bạn để chia sẻ cảm nghĩ nhé.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="../../assets/js/reviews.js"></script>
    </body>
</html>
