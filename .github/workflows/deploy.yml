name: CI/CD Pipeline

on:
  push:
    branches: [product]

jobs:
  build-and-push:
    runs-on: self-hosted
    if: github.ref == 'refs/heads/product'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            hoanganh191/viettravel:latest
            hoanganh191/viettravel:${{ github.sha }}

      - name: Deploy - Restart container on Ubuntu
        run: |
          cd /home/hoanganh/travel-website-api
          docker compose pull
          docker compose up -d --force-recreate
          docker image prune -f
